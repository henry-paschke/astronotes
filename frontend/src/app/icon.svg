<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer limb ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#c4a35a" stroke-width="1"/>

  <!-- Degree ticks (major every 90°, minor every 30°) -->
  <line x1="16" y1="2.5" x2="16" y2="5"   stroke="#c4a35a" stroke-width="1"  stroke-linecap="round"/>
  <line x1="29.5" y1="16" x2="27" y2="16"  stroke="#c4a35a" stroke-width="1"  stroke-linecap="round"/>
  <line x1="16" y1="29.5" x2="16" y2="27"  stroke="#c4a35a" stroke-width="1"  stroke-linecap="round"/>
  <line x1="2.5" y1="16"  x2="5"  y2="16"  stroke="#c4a35a" stroke-width="1"  stroke-linecap="round"/>

  <line x1="25.05" y1="6.95" x2="23.34" y2="8.66"  stroke="#c4a35a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="6.95"  y1="6.95" x2="8.66"  y2="8.66"  stroke="#c4a35a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="6.95"  y1="25.05" x2="8.66" y2="23.34" stroke="#c4a35a" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="25.05" y1="25.05" x2="23.34" y2="23.34" stroke="#c4a35a" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Rete ring (dashed, rotated ~22.5°) -->
  <circle cx="16" cy="16" r="9.5" fill="none" stroke="#c4a35a" stroke-width="0.7"
    stroke-dasharray="3.7 2.2" opacity="0.85"
    transform="rotate(22.5 16 16)"/>

  <!-- Alidade cross -->
  <line x1="16" y1="7"  x2="16" y2="25" stroke="#c4a35a" stroke-width="0.6" opacity="0.5"/>
  <line x1="7"  y1="16" x2="25" y2="16" stroke="#c4a35a" stroke-width="0.6" opacity="0.5"/>

  <!-- Inner plate ring -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#c4a35a" stroke-width="0.7" opacity="0.6"/>

  <!-- Cardinal star points (N/E/S/W) -->
  <circle cx="16" cy="6.5"  r="1.1" fill="#e8c878"/>
  <circle cx="25.5" cy="16" r="1.1" fill="#e8c878"/>
  <circle cx="16" cy="25.5" r="1.1" fill="#e8c878"/>
  <circle cx="6.5"  cy="16" r="1.1" fill="#e8c878"/>

  <!-- Brass pivot -->
  <circle cx="16" cy="16" r="2.2" fill="#c4a35a"/>
  <circle cx="16" cy="16" r="1"   fill="#e8c878"/>
</svg>
